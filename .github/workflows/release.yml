name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      RCLONE_VERSION: v1.73.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rclone
        run: |
          set -euo pipefail
          mkdir -p build/rclone
          curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-osx-arm64.zip" -o build/rclone/rclone.zip
          unzip -q build/rclone/rclone.zip -d build/rclone
          cp "build/rclone/rclone-${RCLONE_VERSION}-osx-arm64/rclone" build/rclone/rclone
          chmod +x build/rclone/rclone

      - name: Build app bundle
        run: RCLONE_PATH="$PWD/build/rclone/rclone" ./Scripts/package_app.sh

      - name: Create DMG
        run: ./Scripts/create_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyLocalDav-arm64
          path: dist/EasyLocalDav-arm64.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EasyLocalDav-arm64.dmg
